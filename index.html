<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vincent Commisso</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<meta name="description" content="Vincent Commisso — Architectural/Design, Property Restoration, Entrepreneurship">
<style>
  :root {
    --bg: #f2f2f2;
    --text-primary: #1a1a1a;
    --text-secondary: #555555;
    --text-tertiary: #8a8a8a;
    --accent: #1a1a1a;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    background-color: var(--bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    min-height: 100vh;
    padding-top: 20vh;
    padding-bottom: 20vh;
  }

  .content-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .name {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.1s;
  }

  .tagline {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.01em;
    margin-bottom: 28px;
    min-height: 1.2em;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
    animation-delay: 0.5s;
  }

  .tagline .cursor {
    display: inline-block;
    width: 1px;
    height: 1em;
    vertical-align: middle;
    background-color: var(--text-secondary);
    margin-left: 2px;
    animation: blink 0.8s step-end infinite;
  }

  .tagline .cursor.done {
    animation: none;
    opacity: 0;
  }

  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
    }
  }

  @keyframes blink {
    50% {
      opacity: 0;
    }
  }

  .categories {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 64px;
    opacity: 0;
  }

  .categories.visible {
    animation: fadeUp 0.6s ease forwards;
  }

  .categories .dot {
    display: none;
  }

  .categories span:not(.dot) {
    position: relative;
    transition: color 0.2s ease;
    cursor: default;
  }

  .categories span:not(.dot)::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -3px;
    height: 1px;
    background-color: var(--text-primary);
    transform: scaleX(0);
    transition: transform 0.25s ease;
  }

  .categories span:not(.dot):hover {
    color: var(--text-primary);
  }

  .categories span:not(.dot):hover::after {
    transform: scaleX(1);
  }

  .social-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding-top: 12px;
    opacity: 0;
  }

  .social-row.visible {
    animation: fadeUp 0.6s ease forwards;
  }

  .social-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border: 1.5px solid var(--text-primary);
    border-radius: 6px;
    color: var(--text-primary);
    transition: background-color 0.25s ease, color 0.25s ease, transform 0.2s ease;
  }

  .social-icon svg {
    width: 16px;
    height: 16px;
  }

  .social-icon:hover {
    background-color: var(--text-primary);
    color: #ffffff;
    transform: translateY(-1px);
  }

  @media (max-width: 480px) {
    .categories {
      font-size: 0.7rem;
      gap: 8px;
    }
  }
</style>
</head>
<body>

  <div class="card">
    <h1 class="name">Vincent Commisso</h1>

    <div class="content-group">
      <p class="tagline"><span id="tagline-text"></span><span class="cursor" id="cursor"></span></p>

      <div class="categories" id="categories">
        <span>Property Restoration</span>
        <span class="dot">&bull;</span>
        <span>Architectural/Design</span>
        <span class="dot">&bull;</span>
        <span>Entrepreneurship</span>
      </div>

      <div class="social-row" id="social-row">
        <a href="mailto:vincentcommisso@icloud.com" class="social-icon" aria-label="Email" title="Email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 6 8.4 6.3a2.4 2.4 0 0 0 3.2 0L22 6"/>
          </svg>
        </a>

        <a href="https://www.linkedin.com/in/vincent-commisso" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="LinkedIn" title="LinkedIn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.03-1.85-3.03-1.85 0-2.14 1.45-2.14 2.94v5.66H9.36V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.61 0 4.28 2.38 4.28 5.47zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM3.56 20.45h3.56V9H3.56z"/>
          </svg>
        </a>

        <!-- TODO: replace href with actual Instagram URL once the account is created -->
        <a href="#" class="social-icon" aria-label="Instagram" title="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <script>
    const text = "Building. Solving Problems. Creating Value.";
    const textEl = document.getElementById('tagline-text');
    const cursorEl = document.getElementById('cursor');
    const categoriesEl = document.getElementById('categories');
    const socialRowEl = document.getElementById('social-row');

    let i = 0;

    function typeChar() {
      if (i < text.length) {
        textEl.textContent += text.charAt(i);
        i++;
        setTimeout(typeChar, 35);
      } else {
        cursorEl.classList.add('done');
        categoriesEl.classList.add('visible');
        setTimeout(() => {
          socialRowEl.classList.add('visible');
        }, 150);
      }
    }

    // Start typing after the tagline container has faded in (matches CSS delay)
    setTimeout(typeChar, 500);
  </script>

</body>
</html>
