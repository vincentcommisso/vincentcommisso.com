<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincent Commisso</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                     Roboto, Helvetica, Arial, sans-serif;
        background: #ffffff;
        color: #222;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
    }

    .container {
        max-width: 700px;
        text-align: center;
    }

    h1 {
        font-size: 3rem;
        font-weight: 600;
        letter-spacing: -1px;
        margin-bottom: 20px;
    }

    .tagline {
        font-size: 1.25rem;
        color: #555;
        margin-bottom: 40px;
        letter-spacing: 1px;
    }

    .statement {
        font-size: 1.15rem;
        line-height: 1.8;
        color: #333;
        margin-bottom: 50px;
    }

    .contact a {
        color: #222;
        text-decoration: none;
        margin: 0 15px;
        border-bottom: 1px solid #ddd;
        transition: all .2s ease;
    }

    .contact a:hover {
        border-color: #222;
    }

    footer {
        margin-top: 60px;
        font-size: 0.9rem;
        color: #999;
    }

    @media (max-width: 768px) {
        h1 {
            font-size: 2.2rem;
        }

        .statement {
            font-size: 1rem;
        }

        .contact a {
            display: block;
            margin: 15px 0;
        }
    }
</style>

</head>
<body>

<div class="container">

<h1>Vincent Commisso</h1>

<div class="tagline">
    Building. Solving Problems. Creating Value.
</div>

<div class="statement">
    I solve problems, create opportunities, and connect people with the right solutions.
    If I can't help, I'll connect you with someone who can.
</div>

<div class="contact">
    <a href="mailto:hello@vincentcommisso.com">
        vincentcommisso@icloud.com
    </a>

    </a>
</div>

<footer>
    © 2026 Vincent Commisso
</footer>

</div>

</body>
</html>
