<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vincent Commisso</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<meta name="description" content="Vincent Commisso — Architectural/Design, Property Restoration, Entrepreneurship">
<style>
  :root {
    --bg: #f2f2f2;
    --text-primary: #1a1a1a;
    --text-secondary: #555555;
    --text-tertiary: #8a8a8a;
    --accent: #1a1a1a;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    background-color: var(--bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    min-height: 100vh;
    padding-top: 20vh;
    padding-bottom: 20vh;
  }

  .content-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .name {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.1s;
  }

  .tagline {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.01em;
    margin-bottom: 28px;
    min-height: 1.2em;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
    animation-delay: 0.5s;
  }

  .tagline .cursor {
    display: inline-block;
    width: 1px;
    height: 1em;
    vertical-align: middle;
    background-color: var(--text-secondary);
    margin-left: 2px;
    animation: blink 0.8s step-end infinite;
  }

  .tagline .cursor.done {
    animation: none;
    opacity: 0;
  }

  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
    }
  }

  @keyframes blink {
    50% {
      opacity: 0;
    }
  }

  .categories {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 64px;
    opacity: 0;
  }

  .categories.visible {
    animation: fadeUp 0.6s ease forwards;
  }

  .categories .dot {
    display: none;
  }

  .categories span:not(.dot) {
    transition: color 0.2s ease, font-weight 0.2s ease;
    cursor: default;
  }

  .categories span:not(.dot):hover {
    color: var(--text-primary);
    font-weight: 800;
  }

  .email-button {
    display: inline-block;
    background-color: transparent;
    color: var(--text-primary);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 12px 36px;
    border: 1.5px solid var(--text-primary);
    border-radius: 6px;
    transition: background-color 0.25s ease, color 0.25s ease, transform 0.2s ease;
    opacity: 0;
  }

  .email-button.visible {
    animation: fadeUp 0.6s ease forwards;
  }

  .email-button:hover {
    background-color: var(--text-primary);
    color: #ffffff;
    transform: translateY(-1px);
  }

  @media (max-width: 480px) {
    .categories {
      font-size: 0.7rem;
      gap: 8px;
    }
  }
</style>
</head>
<body>

  <div class="card">
    <h1 class="name">Vincent Commisso</h1>

    <div class="content-group">
      <p class="tagline"><span id="tagline-text"></span><span class="cursor" id="cursor"></span></p>

      <div class="categories" id="categories">
        <span>Architectural/Design</span>
        <span class="dot">&bull;</span>
        <span>Property Restoration</span>
        <span class="dot">&bull;</span>
        <span>Entrepreneurship</span>
      </div>

      <a href="mailto:vincentcommisso@icloud.com" class="email-button" id="email-btn">Email</a>
    </div>
  </div>

  <script>
    const text = "Building. Solving Problems. Creating Value.";
    const textEl = document.getElementById('tagline-text');
    const cursorEl = document.getElementById('cursor');
    const categoriesEl = document.getElementById('categories');
    const emailBtnEl = document.getElementById('email-btn');

    let i = 0;

    function typeChar() {
      if (i < text.length) {
        textEl.textContent += text.charAt(i);
        i++;
        setTimeout(typeChar, 35);
      } else {
        cursorEl.classList.add('done');
        categoriesEl.classList.add('visible');
        setTimeout(() => {
          emailBtnEl.classList.add('visible');
        }, 150);
      }
    }

    // Start typing after the tagline container has faded in (matches CSS delay)
    setTimeout(typeChar, 500);
  </script>

</body>
</html>
