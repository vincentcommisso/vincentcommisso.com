<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vincent Commisso</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #f2f2f0; /* light gray */
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    max-width: 600px;
    padding: 60px 32px;
    text-align: center;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 600;
    margin-bottom: 40px;
    letter-spacing: -0.01em;
  }

  .tagline {
    font-size: 0.95rem;
    font-weight: 500;
    color: #444;
    margin-bottom: 24px;
  }

  .subtext {
    font-size: 0.85rem;
    line-height: 1.6;
    color: #6b6b6b;
    max-width: 460px;
    margin: 0 auto 36px;
  }

  .email-button {
    display: inline-block;
    padding: 10px 22px;
    font-size: 0.9rem;
    color: #1a1a1a;
    text-decoration: none;
    border: 1px solid #999;
    border-radius: 8px;
    transition: background-color 0.2s ease, border-color 0.2s ease;
  }

  .email-button:hover {
    background-color: rgba(0, 0, 0, 0.04);
    border-color: #666;
  }

  footer {
    margin-top: 48px;
    font-size: 0.8rem;
    color: #999;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Vincent Commisso</h1>
    <p class="tagline">Building. Solving Problems. Creating Value.</p>
    <p class="subtext">
      I solve problems, build opportunities, and connect people to the right solutions.
      If I can't, I'll put you in touch with someone who can.
    </p>
    <a class="email-button" href="mailto:hello@vincentcommisso.com">vincentcommisso@icloud.com</a>
    <footer>&copy; 2026 Vincent Commisso</footer>
  </div>
</body>
</html>
